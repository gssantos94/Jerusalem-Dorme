# Fly.io configuration for Jerusalem Dorme
# Deploy: flyctl launch && flyctl deploy

app = "jerusalem-dorme"
primary_region = "gru"  # São Paulo, Brazil

[build]
dockerfile = "Dockerfile"

[build.args]
NODE_ENV = "production"

[env]
PORT = "3000"
NODE_ENV = "production"
GAME_TIMEOUT_MINUTES = "5"
ALLOWED_ORIGINS = "https://jerusalem-dorme.fly.dev"

[[services]]
protocol = "tcp"
internal_port = 3000

  [services.concurrency]
  type = "connections"
  hard_limit = 1000
  soft_limit = 100

  [[services.ports]]
  port = 80
  handlers = ["http"]

  [[services.ports]]
  port = 443
  handlers = ["tls", "http"]

  [services.http_checks]
  interval = 10000
  timeout = 5000
  grace_period = 5000
  method = "get"
  path = "/api/logs"
  protocol = "http"
  restart_limit = 5
